version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/pboard
    binary: pboard
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/tabesto/productboard-cli/internal/cli.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - repository:
      owner: tabesto
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/tabesto/productboard-cli"
    description: "Read-only CLI tool for ProductBoard API"
    license: "MIT"
    test: |
      system "#{bin}/pboard", "--version"
